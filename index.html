// ساخت منوی درختی
// ============================================================
function buildTreeMenu() {
    const container = document.getElementById('treeMenu');
    container.innerHTML = '';
    categoriesHierarchy.forEach(cat => {
        const catNode = document.createElement('div');
        catNode.className = 'tree-node';
        const header = document.createElement('div');
        header.className = 'tree-header';
        header.innerHTML = `<i class="fas fa-chevron-left"></i><i class="fas ${cat.icon} node-icon"></i> ${cat.name}`;
        const childrenDiv = document.createElement('div');
        childrenDiv.className = 'tree-children';
        function addChildren(parentNode, parentDiv, level = 0) {
            if (parentNode.children) {
                parentNode.children.forEach(child => {
                    const childDiv = document.createElement('div');
                    childDiv.className = 'tree-node';
                    const childHeader = document.createElement('div');
                    childHeader.className = 'tree-header';
                    childHeader.style.paddingRight = `${(level + 1) * 8}px`;
                    childHeader.innerHTML = `<i class="fas fa-chevron-left"></i><i class="fas fa-folder node-icon"></i> ${child.name}`;
                    const childChildrenDiv = document.createElement('div');
                    childChildrenDiv.className = 'tree-children';
                    if (child.children) {
                        addChildren(child, childChildrenDiv, level + 1);
                    } else if (child.phrases) {
                        child.phrases.forEach(phrase => {
                            const leaf = document.createElement('div');
                            leaf.className = 'tree-leaf';
                            leaf.style.paddingRight = `${(level + 2) * 8}px`;
                            leaf.innerHTML = `<span>🔊 ${phrase.eng.substring(0, 25)}</span><span class="leaf-badge">📖</span>`;
                            leaf.onclick = (e) => {
                                e.stopPropagation();
                                selectPhraseDirectly(phrase.eng, phrase.fa);
                                closeMenu();
                                const fakeCard = document.createElement('div');
                                selectPhrase(fakeCard, phrase.eng, phrase.fa);
                                if (fakeCard) fakeCard.remove();
                            };
                            childChildrenDiv.appendChild(leaf);
                        });
                    }
                    let isOpen = false;
                    childHeader.onclick = (e) => {
                        e.stopPropagation();
                        isOpen = !isOpen;
                        childChildrenDiv.classList.toggle('open', isOpen);
                        const icon = childHeader.querySelector('i:first-child');
                        if (icon) icon.className = isOpen ? 'fas fa-chevron-down' : 'fas fa-chevron-left';
                    };
                    if (child.children || child.phrases) {
                        childDiv.appendChild(childHeader);
                        childDiv.appendChild(childChildrenDiv);
                    } else {
                        childHeader.onclick = () => navigateTo(child, [...currentStack, child]);
                        childDiv.appendChild(childHeader);
                    }
                    parentDiv.appendChild(childDiv);
                });
            }
        }
        addChildren(cat, childrenDiv, 0);
        let isOpen = false;
        header.onclick = (e) => {
            e.stopPropagation();
            isOpen = !isOpen;
            childrenDiv.classList.toggle('open', isOpen);
            const icon = header.querySelector('i:first-child');
            if (icon) icon.className = isOpen ? 'fas fa-chevron-down' : 'fas fa-chevron-left';
        };
        catNode.appendChild(header);
        catNode.appendChild(childrenDiv);
        container.appendChild(catNode);
    });
}

function selectPhraseDirectly(eng, fa) {
    if (currentSelectedCard) currentSelectedCard.classList.remove('selected');
    currentSelectedCard = null;
    currentSelected = { eng, fa };
    document.getElementById('selectedLabel').innerHTML = `✅ “${eng.substring(0, 35)}...”`;
}

// ============================================================
// ضبط صدا
// ============================================================
async function startRecording() {
    if (!currentSelected) { alert('ابتدا روی یک عبارت کلیک کنید'); return; }
    if (isRecording) return;
    document.body.classList.add('recording-mode');
    document.getElementById('visualizer').style.display = 'inline-flex';
    document.getElementById('recordingHint').style.display = 'block';
    document.getElementById('selectedLabel').innerHTML = '🔴 در حال ضبط...';
    audioChunks = [];
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaStream = stream;
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => { if (e.data.size) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            document.getElementById('recAudio').src = url;
            document.getElementById('playRecBtn').disabled = false;
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            isRecording = false;
            document.getElementById('startRecBtn').disabled = false;
            document.getElementById('stopRecBtn').disabled = true;
            document.body.classList.remove('recording-mode');
            document.getElementById('visualizer').style.display = 'none';
            document.getElementById('recordingHint').style.display = 'none';
            document.getElementById('selectedLabel').innerHTML = currentSelected ? `✅ “${currentSelected.eng.substring(0, 30)}...”` : 'روی عبارت کلیک کن';
        };
        mediaRecorder.start();
        isRecording = true;
        document.getElementById('startRecBtn').disabled = true;
        document.getElementById('stopRecBtn').disabled = false;
    } catch(e) {
        alert('دسترسی به میکروفون امکانپذیر نیست');
        document.body.classList.remove('recording-mode');
        document.getElementById('visualizer').style.display = 'none';
        document.getElementById('recordingHint').style.display = 'none';
    }
}
function stopRecording() { if (mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }
function playRecording() { const audio = document.getElementById('recAudio'); if (audio.src) audio.play(); }

// ۱. دریافت جمله از FlowPilot
window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'flowpilot_select') {
        const chunk = event.data.payload;
        if (typeof selectPhrase === 'function') {
            const fakeCard = document.createElement('div');
            selectPhrase(fakeCard, chunk.eng, chunk.fa);
            if (fakeCard) fakeCard.remove();
        }
        localStorage.setItem('flowchank_selected', JSON.stringify(chunk));
        console.log('✅ جمله از FlowPilot:', chunk.eng);
    }
    if (event.data && event.data.type === 'flowpilot_ready') {
        if (event.source) {
            event.source.postMessage({
                type: 'flowchank_connected'
            }, '*');
        }
    }
});
